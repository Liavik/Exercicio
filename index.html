<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>
    <main class="container">
        <section id="carousel" class="carousel carousel-fade slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div data-bs-interval="5000" class="carousel-item active">
                    <img class="d-block w-100" src="src/field-8544288_1280.jpg">
                </div>
                <div data-bs-interval="5000" class="carousel-item">
                    <img class="d-block w-100" src="src/wave-9067749_1280.jpg">
                </div>
                <div data-bs-interval="5000" class="carousel-item">
                    <img class="d-block w-100" src="src/penguins-9028827_1280.jpg">
                </div>
            </div>
            <button data-bs-target="#carousel" data-bs-slide="prev" class="carousel-control-prev" type="button">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button data-bs-target="#carousel" data-bs-slide="next" class="carousel-control-next" type="button">
                <span class="carousel-control-next-icon"></span>
            </button>
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carousel" class="active" data-bs-slide-to="0"></button>
                <button type="button" data-bs-target="#carousel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carousel" data-bs-slide-to="2"></button>
            </div>
        </section>
        <section id="animais" class="row">
            <h2>Animais</h2>
            <article class="col-lg-4 col-md-6 col-sm-12">
                <img src="src/penguins-8661248_640.jpg" alt="">
                <h3>Pinguim</h3>
            </article>
            <article class="col-lg-4 col-md-6 col-sm-12">
                <img src="src/polar-bear-404314_640.jpg" alt="">
                <h3>Urso polar</h3>
            </article>
            <article class="col-lg-4 col-md-6 col-sm-12">
                <img src="src/antartica-3427139_640.jpg" alt="">
                <h3>Foca</h3>
            </article>
        </section>
        <section class="row">
            <div class="col">
                <article class="card">
                    <header class="card-header">
                        Temperaturas extremas
                    </header>
                    <div class="card-body">
                        <h4 class="card-title">Congelamento da água</h4>
                        <p class="card-text">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Expedita dolorum odio delectus enim mollitia eos dicta nemo ratione explicabo? Dolor expedita perferendis delectus culpa numquam placeat nobis, eaque minus hic.</p>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
